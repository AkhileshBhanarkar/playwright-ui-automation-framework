name: Playwright Tests

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  playwright-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Tests
        run: mvn test
