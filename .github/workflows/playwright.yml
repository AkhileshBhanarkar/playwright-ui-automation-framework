name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: Optional Playwright grep filter, for example @Smoke or Login
        required: false
        default: ''
      browser:
        description: Browser project to run
        required: false
        default: chrome
        type: choice
        options:
          - chrome
          - firefox
          - webkit

  push:
    branches:
      - main

  pull_request:

jobs:
  playwright-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        env:
          HEADLESS: true
          CI: true
          TEST_FILTER: ${{ github.event.inputs.test_filter || '' }}
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
        run: |
          TEST_ARGS=(--project="$BROWSER")
          if [ -n "$TEST_FILTER" ]; then
            TEST_ARGS+=(--grep="$TEST_FILTER")
          fi
          echo "Running Playwright with: ${TEST_ARGS[*]}"
          npx playwright test "${TEST_ARGS[@]}"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore